<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e8d4cb" />
    <title>Сайт-приглашение</title>
    <style>
      :root {
        color-scheme: light;
        background: #e8d4cb;
      }

      * { box-sizing: border-box; }

      html, body { min-height: 100%; margin: 0; }

      body {
        display: grid;
        place-items: start center;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, .45), transparent 38%),
          #e8d4cb;
      }

      .mobile-canvas {
        width: min(100vw, 430px);
        height: 100dvh;
        overflow: hidden;
        background: #fff;
      }

      .mobile-canvas iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }

      @media (min-width: 431px) {
        .mobile-canvas {
          box-shadow: 0 18px 56px rgba(79, 48, 36, .24);
        }
      }
    </style>
  </head>
  <body>
    <main class="mobile-canvas" aria-label="Сайт-приглашение">
      <iframe title="Сайт-приглашение" src="./invitation.html"></iframe>
    </main>
  </body>
</html>
