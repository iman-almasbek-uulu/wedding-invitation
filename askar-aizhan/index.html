<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Аскар & Айжан | сайт-приглашение</title>
    <style>
      :root { color-scheme: light; background: #e8d4cb; }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body { display: grid; place-items: start center; overflow: hidden; background: radial-gradient(circle at top, rgba(255,255,255,.45), transparent 38%), #e8d4cb; }
      .mobile-canvas { position: relative; width: min(100vw, 430px); height: 100dvh; overflow: hidden; background: #fff; }
      .mobile-canvas iframe { display: block; width: 100%; height: 100%; border: 0; background: #fff; }
      .hero-cover { position: absolute; z-index: 2; inset: 0; display: grid; place-items: center; padding: 28px 18px 32px; background: #fff; transition: opacity .45s ease, visibility .45s step-end; }
      .hero-cover.is-open { opacity: 0; visibility: hidden; pointer-events: none; }
      .hero-card { position: relative; width: min(100%, 396px); height: min(79dvh, 720px); min-height: 510px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 74px 28px 96px; }
      .hero-frame { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
      .hero-heart { position: absolute; top: 18px; left: 50%; z-index: 1; width: 39px; height: 35px; transform: translateX(-50%); background: #fff; color: #58352c; font: 44px/29px Georgia, serif; text-align: center; }
      .hero-names { position: relative; z-index: 1; display: grid; justify-items: center; gap: 12px; width: 100%; }
      .hero-names img { display: block; width: min(100%, 305px); height: auto; mix-blend-mode: multiply; }
      .hero-amp { margin: -20px 0 -19px; color: #ddd6d1; font: italic 110px/.78 Georgia, serif; }
      .open-invitation { position: absolute; bottom: 26px; left: 50%; z-index: 1; display: grid; place-items: center; width: 49px; height: 49px; transform: translateX(-50%); border: 1.5px solid #5b382f; border-radius: 50%; background: #fff; color: #5b382f; font: 16px/1 Georgia, serif; cursor: pointer; }
      .open-invitation::before { content: ''; position: absolute; inset: 5px; border: 1px solid #c7b9b4; border-radius: 50%; }
      .open-invitation span { position: relative; transform: rotate(-21deg); }
      .open-hint { position: absolute; bottom: 3px; left: 50%; z-index: 1; transform: translateX(-50%); width: max-content; margin: 0; color: #76584e; font: 10px/1.2 Arial, sans-serif; letter-spacing: .14em; }
      @media (min-width: 431px) { .mobile-canvas { box-shadow: 0 18px 56px rgba(79,48,36,.24); } }
    </style>
  </head>
  <body>
    <main class="mobile-canvas" aria-label="Сайт-приглашение Аскара и Айжан">
      <iframe title="Сайт-приглашение Аскара и Айжан" src="../invitation.html?client=askar-aizhan&amp;build=20260715d"></iframe>
      <section class="hero-cover" id="hero-cover" aria-label="Открыть приглашение">
        <div class="hero-card">
          <svg class="hero-frame" viewBox="0 0 396 720" aria-hidden="true">
            <path d="M22 126 C14 80 32 49 83 55 C122 61 149 54 165 45 M231 45 C251 56 276 61 319 55 C369 48 384 79 375 128 M22 126 C33 153 26 179 17 205 C8 233 12 251 30 267 M375 128 C364 156 370 182 380 209 C388 234 381 253 363 270 M29 454 C15 489 10 526 21 557 C36 598 19 644 28 681 C37 713 71 719 111 707 M285 707 C329 718 363 709 370 677 C379 638 361 598 376 557 C387 527 380 490 366 454" fill="none" stroke="#58352c" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <div class="hero-heart">♡</div>
          <div class="hero-names">
            <img src="../clients/askar-aizhan/generated/groom-name.png" alt="Аскар" />
            <div class="hero-amp">&amp;</div>
            <img src="../clients/askar-aizhan/generated/bride-name.png" alt="Айжан" />
          </div>
          <button class="open-invitation" type="button" aria-label="Открыть приглашение"><span>00</span></button>
          <p class="open-hint">НАЖМИТЕ, ЧТОБЫ ОТКРЫТЬ</p>
        </div>
      </section>
    </main>
    <script>
      document.querySelector('.open-invitation').addEventListener('click', () => {
        document.querySelector('#hero-cover').classList.add('is-open')
      })
    </script>
  </body>
</html>
